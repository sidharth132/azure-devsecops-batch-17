name: Auto Sync with Upstream

on:
  schedule:
    - cron: "30 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/devopsinsiders/azure-devsecops-batch-17.git || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check branch
        run: |
          git branch

      - name: Sync safely
        run: |
          git checkout main || git checkout master
          git merge upstream/main || echo "merge conflict ignored"

      - name: Push (safe mode)
        run: |
          git push origin HEAD
