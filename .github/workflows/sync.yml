name: Auto Sync with Upstream

on:
  schedule:
    - cron: "30 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Add upstream safely
        run: |
          git remote get-url upstream || git remote add upstream https://github.com/devopsinsiders/azure-devsecops-batch-17.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Sync
        run: |
          git checkout main
          git pull upstream main --rebase

      - name: Push
        run: |
          git push origin main --force
